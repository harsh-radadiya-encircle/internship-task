<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Var, Let, Const Demo</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #output{
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <h1>JavaScript Var, Let, Const Output</h1>

    <div id="output"></div>

    <script>
        let output = document.getElementById("output");

        function show(message){
            output.innerHTML += message + "<br>";
        }

        // 1. var (Function Scope)
        var x = 5;
        show("x = " + x);

        function myfunction() {
            var y = 10;
            show("y inside function = " + y);
        }

        myfunction();

        {
            var abc = 10;
        }

        show("abc = " + abc);

        // 2. let (Block Scope)
        let a = 10;
        show("a before block = " + a);

        if (true) {
            let a = 20;
            show("a inside block = " + a);
        }

        show("a after block = " + a);

        // 3. const (Block Scope)
        const b = 30;
        show("b = " + b);

        const myArray = [1, 2, 3];
        myArray.push(4);
        show("myArray = " + myArray);

        const user = {
            name: "harsh",
            age: 21
        };

        user.age = 22;
        show("user = " + JSON.stringify(user));
    </script>

</body>
</html>
