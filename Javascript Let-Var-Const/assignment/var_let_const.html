<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 1 - Var, Let and Const</title>

<style>
    body{
        font-family: Arial, sans-serif;
        padding:20px;
    }

  
#output{
    background:#f4f4f4;
    padding:20px;
    border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

    <h1>Task 1</h1>

    <h3>
        Create a JavaScript function that demonstrates the use of
        <code>var</code>, <code>let</code>, and <code>const</code>
        inside different blocks (loops, conditions, functions).
    </h3>

    <hr>

    <h2>Output</h2>

    <div id="output"></div>

</div>

<script>

const output = document.getElementById("output");

function show(message){
    output.innerHTML += message + "<br>";
}

function demonstrateVariables(){

    // Function Scope
    var varVariable = "I am var";
    let letVariable = "I am let";
    const constVariable = "I am const";

    show("<h2>Inside Function</h2>");
    show(varVariable);
    show(letVariable);
    show(constVariable);

    // Conditional Block
    if(true){

        var varInIf = "var inside if block";
        let letInIf = "let inside if block";
        const constInIf = "const inside if block";

        show("<h2>Inside If Block</h2>");
        show(varInIf);
        show(letInIf);
        show(constInIf);
    }

    show("<h2>Outside If Block</h2>");
    show(varInIf);

    // Var Loop
    show("<h2>Var Loop</h2>");

    for(var i = 0; i < 3; i++){
        show("var loop i = " + i);
    }

    show("Outside var loop, i = " + i);

    // Let Loop
    show("<h2>Let Loop</h2>");

    for(let j = 0; j < 3; j++){
        show("let loop j = " + j);
    }

    show("Outside let loop, j is not accessible because let is block scoped");
}

demonstrateVariables();

</script>

</body>
</html>
