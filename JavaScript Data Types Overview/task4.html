<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<script>

// String to Number
let strNumber = "123";
let num = Number(strNumber);

console.log("String:", strNumber);
console.log("Converted Number:", num);
console.log("Type:", typeof num);

// Number to String
let age = 22;
let strAge = String(age);

console.log("\nNumber:", age);
console.log("Converted String:", strAge);
console.log("Type:", typeof strAge);

// Boolean to String
let isStudent = true;
let strBoolean = String(isStudent);

console.log("\nBoolean:", isStudent);
console.log("Converted String:", strBoolean);
console.log("Type:", typeof strBoolean);

// String to Boolean
let text = "Hello";
let boolValue = Boolean(text);

console.log("\nString:", text);
console.log("Converted Boolean:", boolValue);
console.log("Type:", typeof boolValue);

</script>

</body>
</html>
