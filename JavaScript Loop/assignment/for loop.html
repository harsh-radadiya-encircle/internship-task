<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        #output{
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    
<div class="container">


    <h1>Task 1</h1>

    <h3>Write a for loop that prints the square of every number from 1 to 10.</h3>

    <hr>

    <div id="output"></div>

</div>


<script>

const output = document.getElementById("output");

function show(message){
    output.innerHTML += message + "<br>";
}

for(let i = 1; i<=10; i++){
    show(`Squre of ${i} is = ${i*i}`);
}

</script>

</body>
</html>
