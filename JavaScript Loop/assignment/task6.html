<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        #output{
            padding:15px;
            background-color: #f4f4f4;
            border-radius:8px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Task 6</h1>
        <h3>Given an array of ages [12, 18, 22, 10, 35], use filter() to create a new array of ages greater than or
            equal to 18.</h3>


            <div id="output"></div>
    </div>

<script>

const output = document.getElementById("output");

function show(message){
    output.innerHTML += message + "<br>";
}

const ages = [12,18,22,10,35];

show(`Before Ages array : ${ages}`);
show("<br>");
const newArr = ages.filter((ages)=>{
    return ages >= 18;
});

show(`After Ages array with filtering : ${newArr}`);


</script>

</body>

</html>
