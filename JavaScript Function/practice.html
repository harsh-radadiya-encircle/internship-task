<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        #output{
            padding: 15px;
            border-radius: 8px;
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    
<div class="container">

<h1>JavaScript Function Practice</h1>

<div id="output"></div>

</div>

<script>

const output = document.getElementById("output");

function show(message){
    output.innerHTML += message + "<br>";
}


function add(a,b){
    show(`A : ${a} B : ${b}`);
    return a+b;
}
show(`The sum of two number is :${add(10,20)}`);

show("<br>");

const greet = function(msg){
    return `Hello ${msg}`;
}
show(`${greet("harsh")}`);

show("<br>");

const subtact = (a,b)=>{
    show(`First Number : ${a} Second Number is : ${b}`);
    return a-b;
}
show("Subtraction : "+subtact(20,10));


const fetchData = new Promise((resolve,reject)=>{
    setTimeout(() => {
        let success = true;
        if(success){
            resolve("Data Fetched Successfully");
        }else{
            reject("Error Fetching Data");
        }
    }, 2000);
})

fetchData
.then((message)=>{
    show(message);
})
.catch((error)=>{
    show(error);
})

async function fetchApiData(){
    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/posts");
        const data = await response.json();
        show(JSON.stringify(data,null,2));
    } catch (error) {
        show(error);
    }
}
fetchApiData();

</script>

</body>
</html>
