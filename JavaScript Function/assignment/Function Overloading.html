<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        #output {
            padding: 15px;
            border-radius: 8px;
            background-color: #f4f4f4;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>10. Function Overloading</h1>

        <h3>Create a calculate function that accepts either two numbers for addition or three numbers for
            multiplication. Implement this using conditionals.</h3>

        <div id="output"></div>

    </div>

    <script>

        const output = document.getElementById("output");

        function show(message) {
            output.innerHTML += message + "<br>";
        }


        function calculate(num1, num2, num3) {
            if (num3 === undefined) {
                return num1 + num2;
            }
            return num1 + num2 + num3;
        }
        show(calculate(10, 20, 30));

    </script>

</body>

</html>
