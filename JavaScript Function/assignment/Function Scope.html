<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        #output {
            padding: 15px;
            border-radius: 8px;
            background-color: #f4f4f4;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>6. Function Scope:</h1>

        <h3>Create a function outer that has a variable outerVar. Inside this function, create another function inner
            that accesses and prints outerVar. Call the inner function.</h3>

        <div id="output"></div>

    </div>

    <script>

        const output = document.getElementById("output");

        function show(message) {
            output.innerHTML += message + "<br>";
        }

        function outer(){
            let outerVar = "outerVar called";
            function inner(){
                show(outerVar);
            }
            inner();
        }
        outer();

        
    </script>

</body>

</html>
