        <h1>4. Parameters and Arguments: AND Default Parameters:</h1>

        <h3>Create a function concatStrings that accepts two strings and concatenates them. If the second string is not
            provided, use "World" as the default value.</h3>

        <div id="output"></div>

    </div>

    <script>

        const output = document.getElementById("output");

        function show(message) {
            output.innerHTML += message + "<br>";
        }

function concatStrings(str1,str2="World"){
    return str1+" "+str2;
}
show(`String Concat : ${concatStrings("Harsh","Radadiya")}`);
show("<br>");
show(`String Concat : ${concatStrings("Harsh")}`);  

    </script>
