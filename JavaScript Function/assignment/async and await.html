<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        #output {
            padding: 15px;
            border-radius: 8px;
            background-color: #f4f4f4;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>13. async and await</h1>

        <h3>Write an async function placeOrder that uses a promise to simulate checking stock and another promise to
            simulate processing the order. Use await to chain these operations.</h3>

        <div id="output"></div>

    </div>

    <script>

        const output = document.getElementById("output");

        function show(message) {
            output.innerHTML += message + "<br>";
        }

        function checkStock(quantity){
           return new Promise((resolve,reject)=>{
                if(quantity > 0){
                    resolve("Stock Available");
                }else{
                    reject("Out of Stock");
                }
           })
        }

        function processOrder(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    resolve("Order Process Successfully");
                },2000)
            })
        }

        async function placeOrder(quantity) {
            try{
                let stockstatus = await checkStock(quantity);
                show(stockstatus);

                let processOrderStatus = await processOrder();
                show(processOrderStatus); 
            }catch(error){
                show(error);
            }
        }

        placeOrder(0);

    </script>

</body>

</html>
